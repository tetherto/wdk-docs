name: Solana Gasless Source Watch

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/solana-gasless-source-watch.yml'
      - 'scripts/check-solana-gasless-source-prs.mjs'
      - 'content/docs/sdk/wallet-modules/wallet-solana-gasless/**'
      - 'content/docs/sdk/wallet-modules/index.mdx'
      - 'content/docs/sdk/all-modules.mdx'
      - 'src/lib/custom-tree.ts'
  schedule:
    - cron: '23 8 * * *'
  workflow_dispatch:

concurrency:
  group: solana-gasless-source-watch-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  source-watch:
    name: Check source pull requests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check source pull requests
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SOURCE_REPO: tetherto/wdk-wallet-solana-gasless
        run: node scripts/check-solana-gasless-source-prs.mjs
